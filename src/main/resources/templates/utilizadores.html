<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout}">

<div layout:fragment="content">

    <div class="container mt-5">

        <div th:if="${success}" class="alert alert-success p-3" th:text="${success}"></div>

        <div class="table-responsive shadow rounded p-3">
            <table id="usersTable" class="table table-striped">
                <thead>
                    <tr>
                        <th style="width: 15%" th:text="#{table.username}"></th>
                        <th style="width: 30%" th:text="#{table.name}"></th>
                        <th style="width: 20%" th:text="#{table.internalId}"></th>
                        <th style="width: 35%" th:text="#{table.role}"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${fireDepartmentUsers}">
                        <td th:text="${user.username}"></td>
                        <td th:text="${user.name}"></td>
                        <td th:text="${user.internalId}"></td>
                        <td th:attr="data-order=#{${'role.' + user.role}}">
                            <form th:action="@{/utilizadores/alterar}" method="post"
                                  class="d-flex align-items-center">

                                <input type="hidden" name="username" th:value="${user.username}"/>


                                <select name="role"
                                        class="form-select form-select-sm me-2"
                                        th:disabled="${user.role == 'ROLE_COMMAND'}">
                                    <option th:each="role : ${roles}"
                                            th:value="${role}"
                                            th:text="#{${'role.' + role}}"
                                            th:selected="${role == user.role}"
                                            th:disabled="${role == 'ROLE_COMMAND'}">
                                    </option>
                                </select>

                                <button type="submit"
                                        class="btn btn-sm btn-primary"
                                        th:disabled="${user.role == 'ROLE_COMMAND'}"
                                        th:text="#{role.save}">
                                </button>


                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<div layout:fragment="page-scripts">
    <script th:inline="none"> // forces thymeleaf to ignore this
    $(document).ready(function () {
        $('#usersTable').DataTable({
            pageLength: -1,
            dom: 'frti',  // remove length dropdown
            order: [[2, 'asc']] // sort by internal ID
        });
    });
    </script>
</div>

</html>
