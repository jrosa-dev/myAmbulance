<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-4" th:text="#{login.title}">Login</h3>

                    <div th:if="${param.error}" class="alert alert-danger" th:text="#{login.error}"></div>
                    <div th:if="${param.logout}" class="alert alert-success" th:text="#{login.logout}"></div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label" th:text="#{login.username}">Username</label>
                            <input type="text" name="username" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{login.password}">Password</label>
                            <input type="password" name="password" class="form-control" required/>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary" th:text="#{login.button}">Login</button>
                        </div>
                    </form>

                    <hr/>
                    <p class="text-center mb-0">
                        <span th:text="#{login.no.account}">Don't have an account?</span>
                        <a href="/signup" th:text="#{login.signup.link}">Sign up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
