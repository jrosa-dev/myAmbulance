<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{app.title}">myAmb</title>
    <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'>
  <path fill='%23ce2029' d='m9 7.539l6 14L18.66 13H23v-2h-5.66L15 16.461l-6-14L5.34 11H1v2h5.66z'/>
</svg>"/>

    <!-- Styles and bootstrap CSS import -->
    <th:block th:replace="~{fragments/styling :: styles}"></th:block>

    <script th:src="@{/assets/vendor/js/helpers.js}"></script>
    <script th:src="@{/assets/js/config.js}"></script>
    <!-- jQuery -->
    <script th:src="@{/assets/vendor/libs/jquery/jquery.js}"></script>

    <!-- Popper -->
    <script th:src="@{/assets/vendor/libs/popper/popper.js}"></script>

    <!-- Materio JS -->
    <script th:src="@{/assets/vendor/js/bootstrap.js}"></script>
    <script th:src="@{/assets/js/main.js}"></script>


    <!-- DataTables -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
</head>

<body>

<div class="layout-wrapper layout-content-navbar">
    <div class="layout-container">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <div class="layout-page">
            <div class="layout-menu-toggle d-xl-none p-3">
                <a class="d-flex align-items-center text-decoration-none">
                    <i class="ri ri-menu-unfold-3-fill" style="font-size: 2rem;"></i>
                </a>
            </div>
            <div class="content-wrapper">
                <div class="container-xxl flex-grow-1 container-p-y"
                     layout:fragment="content">
                </div>
                <div class="content-backdrop fade"></div>
            </div><!-- content-wrapper -->
        </div><!-- layout-page -->
    </div><!-- layout-container -->
</div><!-- layout-wrapper -->

<div class="layout-overlay layout-menu-toggle"></div>



<script>
    document.addEventListener("DOMContentLoaded", function () {
        /* open and close sidebar */
        const toggles = document.querySelectorAll(".layout-menu-toggle");
        const html = document.documentElement;

        toggles.forEach(btn => {
            btn.addEventListener("click", function () {
                html.classList.toggle("layout-menu-expanded");
            });
        });


        /* sidebar language submenu toggle */
        document.querySelectorAll(".menu-toggle").forEach(toggle => {
            toggle.addEventListener("click", function (e) {
                e.preventDefault();

                const item = this.closest(".menu-item");
                const submenu = item?.querySelector(".menu-sub");

                if (!submenu) return;

                item.classList.toggle("open");

                if (item.classList.contains("open")) {
                    submenu.style.display = "block";
                } else {
                    submenu.style.display = "none";
                }
            });
        });
    });
</script>

<th:block layout:fragment="page-scripts"></th:block>

</body>
</html>
