<!DOCTYPE html>
<!-- As Bootstrap is being imported with a link and not stored locally and to simplify simple visual changes are made here -->
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="styles">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Boldonse&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>


    <!-- Overrides -->
    <style>
        .navbar-brand {
            font-family: 'Boldonse', sans-serif !important;
        }
        body {
            font-family: 'Open Sans', sans-serif !important;
        }

        .btn-primary {
            background-color: #ce2029 !important;
            border-color: #ce2029 !important;
        }

        .btn-primary:hover {
            background-color: #97282d !important;
            border-color: #97282d !important;
        }
    </style>



</th:block>
</html>
